<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CampusNav · מכללת עזריאלי</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --red: #C8102E;
  --navy: #0f1b35;
  --navy-light: #1a2d54;
  --blue: #1d4ed8;
  --gray-50: #f8fafc;
  --gray-100: #f1f5f9;
  --gray-200: #e2e8f0;
  --gray-400: #94a3b8;
  --gray-600: #475569;
  --gray-800: #1e293b;
  --white: #ffffff;
  --success: #059669;
  --font: 'Heebo', sans-serif;
  --radius: 14px;
  --radius-sm: 8px;
  --shadow-lg: 0 12px 40px rgba(0,0,0,0.14);
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:var(--font); background:var(--gray-50); color:var(--gray-800); min-height:100vh; direction:rtl; }

/* HEADER */
header { background:var(--navy); position:sticky; top:0; z-index:100; box-shadow:0 2px 20px rgba(0,0,0,0.3); }
.header-inner { max-width:900px; margin:0 auto; padding:14px 24px; display:flex; align-items:center; justify-content:space-between; }
.header-brand { display:flex; align-items:center; gap:14px; }
.header-logo { height:44px; filter:brightness(0) invert(1); opacity:0.95; }
.header-divider { width:1px; height:32px; background:rgba(255,255,255,0.2); }
.header-title { color:var(--white); font-size:1.05rem; font-weight:600; }
.header-subtitle { color:rgba(255,255,255,0.5); font-size:0.75rem; }
.header-badge { background:var(--red); color:white; font-size:0.7rem; font-weight:700; padding:4px 12px; border-radius:20px; }

/* HERO */
.hero { background:linear-gradient(135deg, var(--navy) 0%, var(--navy-light) 60%, #1e3a6e 100%); padding:52px 24px 76px; text-align:center; position:relative; overflow:hidden; }
.hero::before { content:''; position:absolute; top:-60px; right:-60px; width:300px; height:300px; background:radial-gradient(circle, rgba(200,16,46,0.15) 0%, transparent 70%); border-radius:50%; }
.hero-icon { font-size:2.8rem; margin-bottom:12px; display:block; animation:float 3s ease-in-out infinite; }
@keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
.hero h1 { font-size:2.2rem; font-weight:900; color:var(--white); margin-bottom:8px; }
.hero h1 span { color:#ff6b7a; }
.hero p { color:rgba(255,255,255,0.6); font-size:0.95rem; font-weight:300; }

/* MAIN */
.main { max-width:860px; margin:-36px auto 60px; padding:0 20px; position:relative; z-index:10; }
.card { background:var(--white); border-radius:var(--radius); box-shadow:var(--shadow-lg); overflow:hidden; }

/* FORM */
.form-panel { padding:30px 34px; }
.mode-tabs { display:flex; background:var(--gray-100); border-radius:var(--radius-sm); padding:4px; margin-bottom:26px; gap:4px; }
.mode-tab { flex:1; padding:9px 16px; border:none; background:transparent; border-radius:6px; font-family:var(--font); font-size:0.88rem; font-weight:500; color:var(--gray-600); cursor:pointer; transition:all 0.2s; }
.mode-tab.active { background:var(--white); color:var(--navy); box-shadow:0 1px 6px rgba(0,0,0,0.1); }

.field-group { margin-bottom:18px; }
.field-label { font-size:0.78rem; font-weight:700; color:var(--gray-600); letter-spacing:0.5px; text-transform:uppercase; margin-bottom:8px; display:flex; align-items:center; gap:6px; }

/* FLOOR CHIPS */
.floor-chips { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:8px; }
.chip { padding:4px 11px; border-radius:20px; border:1.5px solid var(--gray-200); background:var(--white); font-family:var(--font); font-size:0.76rem; font-weight:600; color:var(--gray-600); cursor:pointer; transition:all 0.15s; }
.chip:hover { border-color:var(--navy); color:var(--navy); }
.chip.active { background:var(--navy); border-color:var(--navy); color:white; }

/* SELECT */
.select-wrap { position:relative; }
select { width:100%; padding:13px 16px; font-family:var(--font); font-size:0.95rem; font-weight:500; color:var(--gray-800); background:var(--gray-50); border:1.5px solid var(--gray-200); border-radius:var(--radius-sm); appearance:none; cursor:pointer; transition:border-color 0.2s, box-shadow 0.2s; direction:rtl; }
select:focus { outline:none; border-color:var(--blue); box-shadow:0 0 0 3px rgba(29,78,216,0.1); background:var(--white); }
.sel-arrow { position:absolute; left:14px; top:50%; transform:translateY(-50%); pointer-events:none; color:var(--gray-400); font-size:0.75rem; }

/* SWAP */
.swap-row { display:flex; justify-content:center; margin:6px 0; }
.swap-btn { background:none; border:1.5px solid var(--gray-200); border-radius:50%; width:36px; height:36px; cursor:pointer; font-size:1rem; color:var(--gray-600); transition:all 0.2s; display:flex; align-items:center; justify-content:center; }
.swap-btn:hover { border-color:var(--blue); color:var(--blue); transform:rotate(180deg); }

/* CALC BUTTON */
.calc-btn { width:100%; padding:15px; background:var(--navy); color:var(--white); border:none; border-radius:var(--radius-sm); font-family:var(--font); font-size:1rem; font-weight:700; cursor:pointer; transition:all 0.2s; margin-top:8px; display:flex; align-items:center; justify-content:center; gap:8px; }
.calc-btn:hover { background:var(--navy-light); transform:translateY(-1px); box-shadow:0 6px 20px rgba(15,27,53,0.3); }

/* ERROR */
.error-msg { background:#fff1f2; border:1px solid #fecdd3; border-radius:var(--radius-sm); padding:13px 18px; color:#be123c; font-size:0.9rem; font-weight:500; text-align:center; display:none; margin-top:14px; }
.error-msg.show { display:block; animation:fadeUp 0.3s ease; }

/* DIVIDER */
.divider { height:1px; background:var(--gray-100); }

/* RESULTS */
.results { padding:26px 34px 34px; display:none; animation:fadeUp 0.4s ease; }
.results.show { display:block; }
@keyframes fadeUp { from{opacity:0;transform:translateY(12px)} to{opacity:1;transform:translateY(0)} }

.results-head { display:flex; align-items:center; justify-content:space-between; margin-bottom:18px; }
.results-title { font-size:0.95rem; font-weight:700; }
.route-badge { background:#dbeafe; color:#1e40af; font-size:0.75rem; font-weight:700; padding:4px 12px; border-radius:20px; }

/* METRICS */
.metrics { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; margin-bottom:22px; }
.metric { background:var(--gray-50); border:1px solid var(--gray-200); border-radius:var(--radius-sm); padding:13px 10px; text-align:center; }
.metric-icon { font-size:1.2rem; display:block; margin-bottom:4px; }
.metric-val { font-size:1.3rem; font-weight:800; color:var(--navy); display:block; margin-bottom:2px; }
.metric-lbl { font-size:0.72rem; color:var(--gray-400); font-weight:500; }

/* STEPS */
.steps-label { font-size:0.78rem; font-weight:700; color:var(--gray-400); letter-spacing:0.8px; text-transform:uppercase; margin-bottom:14px; }
.steps { position:relative; }
.step { display:flex; align-items:flex-start; gap:14px; position:relative; padding-bottom:18px; }
.step:last-child { padding-bottom:0; }
.step-line { position:absolute; right:11px; top:28px; width:2px; height:calc(100% - 10px); background:var(--gray-200); }
.step:last-child .step-line { display:none; }
.step-dot { width:24px; height:24px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; font-size:0.68rem; font-weight:800; position:relative; z-index:1; }
.dot-start { background:var(--success); color:white; }
.dot-end   { background:var(--red); color:white; }
.dot-mid   { background:var(--gray-200); color:var(--gray-600); }
.step-body { flex:1; padding-top:2px; }
.step-name { font-size:0.95rem; font-weight:600; color:var(--gray-800); display:flex; align-items:center; gap:6px; flex-wrap:wrap; }
.floor-tag { font-size:0.7rem; font-weight:700; padding:2px 8px; border-radius:10px; white-space:nowrap; }
.step-instr { display:inline-flex; align-items:center; gap:4px; background:#eff6ff; color:var(--blue); font-size:0.76rem; font-weight:600; padding:3px 10px; border-radius:20px; margin-top:5px; }

footer { text-align:center; padding:22px; color:var(--gray-400); font-size:0.8rem; }

@media(max-width:600px) {
  .hero h1 { font-size:1.75rem; }
  .form-panel, .results { padding:20px 18px; }
  .metrics { gap:6px; }
  .metric { padding:10px 6px; }
  .metric-val { font-size:1.1rem; }
}
</style>
</head>

<header>
  <div class="header-inner">
    <div class="header-brand">
      <img src="azrieli_logo.png" class="header-logo" alt="עזריאלי" onerror="this.style.display='none'">
      <div class="header-divider"></div>
      <div>
        <div class="header-title">CampusNav</div>
        <div class="header-subtitle">מערכת ניווט חכמה</div>
      </div>
    </div>
    <span class="header-badge">BETA</span>
  </div>
</header>

<div class="hero">
  <span class="hero-icon">🧭</span>
  <h1>נווט <span>חכם</span> במכללה</h1>
  <p>מצא את המסלול הקצר ביותר בין כל שתי נקודות · אלגוריתם דייקסטרה</p>
</div>

<div class="main">
  <div class="card">
    <div class="form-panel">

      <div class="mode-tabs">
        <button class="mode-tab active" onclick="setMode('time',this)">⏱ מהיר ביותר</button>
        <button class="mode-tab" onclick="setMode('dist',this)">📏 קצר ביותר</button>
      </div>

      <!-- FROM -->
      <div class="field-group">
        <div class="field-label"><span>📍</span> נקודת מוצא</div>
        <div class="floor-chips" id="chips-from"></div>
        <div class="select-wrap">
          <select id="sel-from" onchange="clearResults()"></select>
          <span class="sel-arrow">▼</span>
        </div>
      </div>

      <div class="swap-row">
        <button class="swap-btn" onclick="doSwap()" title="החלף">⇅</button>
      </div>

      <!-- TO -->
      <div class="field-group">
        <div class="field-label"><span>🎯</span> יעד</div>
        <div class="floor-chips" id="chips-to"></div>
        <div class="select-wrap">
          <select id="sel-to" onchange="clearResults()"></select>
          <span class="sel-arrow">▼</span>
        </div>
      </div>

      <button class="calc-btn" onclick="calculate()"><span>🔍</span> חשב מסלול</button>
      <div class="error-msg" id="err"></div>
    </div>

    <div class="divider"></div>

    <div class="results" id="results">
      <div class="results-head">
        <div class="results-title">✅ המסלול המלא</div>
        <span class="route-badge" id="badge">מסלול מהיר</span>
      </div>
      <div class="metrics">
        <div class="metric"><span class="metric-icon">⏱</span><span class="metric-val" id="m-t">—</span><span class="metric-lbl">זמן</span></div>
        <div class="metric"><span class="metric-icon">📏</span><span class="metric-val" id="m-d">—</span><span class="metric-lbl">מרחק</span></div>
        <div class="metric"><span class="metric-icon">🚩</span><span class="metric-val" id="m-s">—</span><span class="metric-lbl">עצירות</span></div>
      </div>
      <div class="steps-label">שלבי המסלול</div>
      <div class="steps" id="steps"></div>
    </div>
  </div>
</div>

<footer>CampusNav · מכללת עזריאלי ירושלים · אלגוריתם דייקסטרה · פרויקט חקר ביצועים 2</footer>

// ── HELPERS ────────────────────────────────────────────────────────────────────
function floorLabel(f) {
  if (f === 'כל הקומות') return f;
  const n = parseInt(f);
  if (n === 0) return 'קומת קרקע';
  return n > 0 ? 'קומה ' + n : 'קומה ' + f;
}

function typeIcon(t) {
  return ({'כיתה':'🏫','מזון':'☕','שירות':'🔧','כניסה חיצונית':'🚪','כניסה':'🚪','תשתית':'🛗','אולם':'🎭','אזור למידה':'📚','אזור ישיבה':'🪑','חוץ':'🌳','צומת מרכזי':'⭕'})[t] || '📍';
}

const FLOOR_COLORS = {
  '-3':['#ffedd5','#9a3412'], '-2':['#fee2e2','#991b1b'], '-1':['#ede9fe','#5b21b6'],
  '0': ['#e0f2fe','#0369a1'], '1': ['#dcfce7','#166534'],
  '2': ['#fef9c3','#854d0e'], '3': ['#fce7f3','#9d174d'], 'כל הקומות':['#f1f5f9','#475569']
};

function floorTag(f) {
  const [bg, txt] = FLOOR_COLORS[f] || ['#f1f5f9','#475569'];
  return '<span class="floor-tag" style="background:' + bg + ';color:' + txt + '">' + floorLabel(f) + '</span>';
}

function instrIcon(instr) {
  if (!instr) return '';
  if (instr.includes('ימינה')) return '↪';
  if (instr.includes('שמאלה')) return '↩';
  if (instr.includes('עלה')) return '↑';
  if (instr.includes('רד')) return '↓';
  if (instr.includes('צא') || instr.includes('כנס')) return '🚪';
  if (instr.includes('חזור')) return '↰';
  return '→';
}

const FLOOR_ORDER = ['-3','-2','-1','0','1','2','3'];

// ── FLOOR CHIPS ───────────────────────────────────────────────────────────────
const activeFloor = { from: 'all', to: 'all' };

function buildChips(which) {
  const el = document.getElementById('chips-' + which);
  const floors = FLOOR_ORDER.filter(f => Object.values(NODES).some(n => n.floor === f));
  el.innerHTML = '';

  const all = document.createElement('button');
  all.className = 'chip active';
  all.textContent = 'הכל';
  all.onclick = function() { filterFloor(which, 'all'); };
  el.appendChild(all);

  floors.forEach(function(f) {
    const btn = document.createElement('button');
    btn.className = 'chip';
    btn.textContent = floorLabel(f);
    btn.onclick = function() { filterFloor(which, f); };
    el.appendChild(btn);
  });
}

function filterFloor(which, floor) {
  activeFloor[which] = floor;
  document.getElementById('chips-' + which).querySelectorAll('.chip').forEach(function(c) {
    c.classList.remove('active');
    const label = c.textContent;
    const match = floor === 'all' ? label === 'הכל' : label === floorLabel(floor);
    if (match) c.classList.add('active');
  });
  rebuildSelect(which);
  clearResults();
}

function rebuildSelect(which) {
  const sel = document.getElementById('sel-' + which);
  const prev = sel.value;
  sel.innerHTML = '';
  const filter = activeFloor[which];

  const byFloor = {};
  Object.entries(NODES).forEach(function(e) {
    const id = e[0], n = e[1];
    if (filter !== 'all' && n.floor !== filter) return;
    if (!byFloor[n.floor]) byFloor[n.floor] = [];
    byFloor[n.floor].push({ id: id, name: n.name, type: n.type, floor: n.floor });
  });

  FLOOR_ORDER.forEach(function(f) {
    if (!byFloor[f]) return;
    const og = document.createElement('optgroup');
    og.label = floorLabel(f);
    byFloor[f].forEach(function(n) {
      const opt = document.createElement('option');
      opt.value = n.id;
      opt.textContent = typeIcon(n.type) + ' ' + n.name;
      og.appendChild(opt);
    });
    sel.appendChild(og);
  });

  if ([...sel.options].some(function(o) { return o.value === prev; })) {
    sel.value = prev;
  }
}

// ── SWAP ──────────────────────────────────────────────────────────────────────
function doSwap() {
  const f = document.getElementById('sel-from');
  const t = document.getElementById('sel-to');
  const fv = f.value, tv = t.value;
  const ff = activeFloor.from, tf = activeFloor.to;

  activeFloor.from = tf;
  activeFloor.to   = ff;

  // swap chips
  ['from','to'].forEach(function(which) {
    const fl = activeFloor[which];
    document.getElementById('chips-' + which).querySelectorAll('.chip').forEach(function(c) {
      c.classList.remove('active');
      const match = fl === 'all' ? c.textContent === 'הכל' : c.textContent === floorLabel(fl);
      if (match) c.classList.add('active');
    });
  });

  rebuildSelect('from');
  rebuildSelect('to');

  // restore values if available
  if ([...f.options].some(function(o){ return o.value === tv; })) f.value = tv;
  if ([...t.options].some(function(o){ return o.value === fv; })) t.value = fv;

  clearResults();
}

// ── DIJKSTRA ──────────────────────────────────────────────────────────────────
function dijkstra(adj, src, tgt) {
  const ids = Object.keys(NODES);
  const dist = {}, prev = {};
  const unvisited = new Set(ids);
  ids.forEach(function(n) { dist[n] = Infinity; prev[n] = null; });
  dist[src] = 0;
  while (unvisited.size > 0) {
    let u = null;
    unvisited.forEach(function(n) { if (u === null || dist[n] < dist[u]) u = n; });
    if (u === tgt || dist[u] === Infinity) break;
    unvisited.delete(u);
    (adj[u] || []).forEach(function(e) {
      const nb = e[0], w = e[1];
      if (!unvisited.has(nb)) return;
      const alt = dist[u] + w;
      if (alt < dist[nb]) { dist[nb] = alt; prev[nb] = u; }
    });
  }
  if (dist[tgt] === Infinity) return null;
  const path = [];
  let c = tgt;
  while (c !== null) { path.unshift(c); c = prev[c]; }
  return path[0] === src ? { path: path, total: dist[tgt] } : null;
}

// ── MODE ──────────────────────────────────────────────────────────────────────
let mode = 'time';
function setMode(m, el) {
  mode = m;
  document.querySelectorAll('.mode-tab').forEach(function(t){ t.classList.remove('active'); });
  el.classList.add('active');
  clearResults();
}

function clearResults() {
  document.getElementById('results').classList.remove('show');
  document.getElementById('err').classList.remove('show');
}

// ── CALCULATE ─────────────────────────────────────────────────────────────────
function calculate() {
  const src = document.getElementById('sel-from').value;
  const tgt = document.getElementById('sel-to').value;
  const errEl = document.getElementById('err');
  errEl.classList.remove('show');

  if (src === tgt) {
    errEl.textContent = '📍 נקודת המוצא והיעד זהות!';
    errEl.classList.add('show');
    return;
  }

  const adj = mode === 'time' ? ADJ_TIME : ADJ_DIST;
  const res = dijkstra(adj, src, tgt);

  if (!res) {
    errEl.textContent = '❌ לא נמצא מסלול — ייתכן שהצמתים מנותקים מהגרף';
    errEl.classList.add('show');
    return;
  }

  // calc totals
  let totalTime = 0, totalDist = 0;
  for (let i = 0; i < res.path.length - 1; i++) {
    const a = res.path[i], b = res.path[i + 1];
    const te = (ADJ_TIME[a] || []).find(function(x){ return x[0] === b; });
    const de = (ADJ_DIST[a] || []).find(function(x){ return x[0] === b; });
    if (te) totalTime += te[1];
    if (de) totalDist += de[1];
  }

  const m = Math.floor(totalTime / 60), s = Math.round(totalTime % 60);
  document.getElementById('m-t').textContent = m > 0 ? m + ':' + String(s).padStart(2,'0') : s + '″';
  document.getElementById('m-d').textContent = totalDist + 'מ׳';
  document.getElementById('m-s').textContent = res.path.length - 1;
  document.getElementById('badge').textContent = mode === 'time' ? '⚡ מסלול מהיר' : '📏 מסלול קצר';

  // render steps
  const stepsEl = document.getElementById('steps');
  stepsEl.innerHTML = '';
  res.path.forEach(function(nodeId, i) {
    const node = NODES[nodeId];
    const isFirst = i === 0;
    const isLast  = i === res.path.length - 1;
    const prevId  = isFirst ? null : res.path[i - 1];
    const instr   = prevId ? (INSTR[prevId + '_' + nodeId] || 'המשך ישר') : '';
    const ic      = instrIcon(instr);
    const dotCls  = isFirst ? 'dot-start' : isLast ? 'dot-end' : 'dot-mid';
    const dotTxt  = isFirst ? '✓' : isLast ? '★' : String(i);
    const instrHtml = instr ? '<span class="step-instr">' + ic + ' ' + instr + '</span>' : '';

    const div = document.createElement('div');
    div.className = 'step';
    div.innerHTML =
      '<div class="step-line"></div>' +
      '<div class="step-dot ' + dotCls + '">' + dotTxt + '</div>' +
      '<div class="step-body">' +
        '<div class="step-name">' + typeIcon(node.type) + ' ' + node.name + ' ' + floorTag(node.floor) + '</div>' +
        instrHtml +
      '</div>';
    stepsEl.appendChild(div);
  });

  document.getElementById('results').classList.add('show');
  document.getElementById('results').scrollIntoView({ behavior:'smooth', block:'start' });
}

buildChips('from');
buildChips('to');
